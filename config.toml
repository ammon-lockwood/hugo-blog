baseURL = "https://lockwood.fun/"
locale = "en-us"
title = "Lockwood Family Having Fun Writing Code"

DefaultContentLanguage = "en"
SectionPagesMenu = "main"
enableRobotsTXT = true
enableEmoji = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"

[params]
  favicon = ""
  github = "https://github.com/sumnercreations/hugo-blog"
  background_color_class = "bg-dark-gray"
  recent_posts_number = 3
  show_reading_time = true
  custom_css = ["css/custom_main.css"]

[module]
  [[module.imports]]
    path = "github.com/gohugo-ananke/ananke/v2"